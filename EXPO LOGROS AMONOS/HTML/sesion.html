<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ámonos - Iniciar Sesión</title>
    <link rel="stylesheet" href="CSS/sesion.css">
</head>
<body>
    
    <main class="login-wrapper">

        
        <section class="login-banner">
            <div class="banner-overlay">
                <h2>Un país. Mil experiencias.</h2>
                <p>Descubre los mejores destinos turísticos de El Salvador</p>
            </div>
        </section>

        
        <section class="login-form-container">
            <header class="brand-header">
                <div class="logo-icon"></div>
                <h1 class="brand-name">Ámonos</h1>
                <p class="brand-tagline">One country. A thousand experiences.</p>
            </header>
                    
            <h2 class="welcome-title">¡BIENVENIDO DE NUEVO!</h2>
            <p class="welcome-subtitle">Ingresa a tu cuenta para planificar tu próxima aventura</p>

            
            <form action="index.html" method="GET" class="login-form">

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" placeholder="•••••••••••••" required>
                        <button type="button" class="btn-toggle-password" title="Mostrar u ocultar contraseña"></button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Recordarme en este equipo
                    </label>
                    <a href="recuperar.html" class="forgot-pass">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn-primary">Iniciar sesión</button>

                <div class="divider">
                    <span>o continuar con</span>
                </div>

                <button type="button" class="btn-google">
                    <span class="google-icon">G</span> Iniciar sesión con Google
                </button>
            </form>

            <footer class="signup-prompt">
                <p>¿No tienes cuenta? <a href="registro.html" class="signup-link">Regístrate aquí</a></p>
            </footer>

        </section>

    </main>

</body>
</html>
