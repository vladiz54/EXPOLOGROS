<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ámonos - Registrarse</title>
   <link rel="stylesheet" href="cs">
</head>
<body>
    
    <main class="login-wrapper">

        <!-- SECCIÓN IZQUIERDA: BANNER / IMAGEN DE FONDO -->
        <section class="login-banner">
            <div class="banner-overlay">
                <h2>Un país. Mil experiencias.</h2>
                <p>Descubre los mejores destinos turísticos de El Salvador</p>
            </div>
        </section>

        <!-- SECCIÓN DERECHA: FORMULARIO DE REGISTRO -->
        <section class="login-form-container">
            <header class="brand-header">
                <div class="logo-icon">📍</div>
                <h1 class="brand-name">Ámonos</h1>
                <p class="brand-tagline">One country. A thousand experiences.</p>
            </header>
                    
            <h2 class="welcome-title">CREAR UNA CUENTA</h2>
            <p class="welcome-subtitle">Regístrate para empezar a planificar tu próxima aventura</p>

            <form action="sesion.html" method="GET" class="login-form">

                <div class="form-group">
                    <label for="name">Nombre completo</label>
                    <input type="text" id="name" name="name" placeholder="Tu nombre y apellido" required>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
                        <button type="button" class="btn-toggle-password" title="Mostrar u ocultar contraseña">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="margin-top: 10px;">Registrarse</button>

                <div class="divider">
                    <span>o registrarte con</span>
                </div>

                <button type="button" class="btn-google">
                    <span class="google-icon">G</span> Registrarse con Google
                </button>
            </form>

            <footer class="signup-prompt">
                <p>¿Ya tienes una cuenta? <a href="sesion.html" class="signup-link">Inicia sesión aquí</a></p>
            </footer>

        </section>

    </main>

</body>
</html>
